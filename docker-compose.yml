services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./api-sonar-main/api-sonar-main/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      REQUIRE_ADMIN_AUTH: ${REQUIRE_ADMIN_AUTH}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTO_BOOTSTRAP_DEMO_DATA: ${AUTO_BOOTSTRAP_DEMO_DATA}
      REQUIRE_REDIS: ${REQUIRE_REDIS}
      APP_HASH_PEPPER: ${APP_HASH_PEPPER}
      EXPERIMENT_MASTER_SEED: ${EXPERIMENT_MASTER_SEED}
      DEPLOYMENT_CONTEXT: ${DEPLOYMENT_CONTEXT}
      SITE_CODE: ${SITE_CODE}
      CAMPAIGN_CODE: ${CAMPAIGN_CODE}
      ENVIRONMENT_LABEL: ${ENVIRONMENT_LABEL}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW}
      PROJECT_PARAMETERS_PATH: /app/project_parameters.json
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./sorteo-sonar-main
      args:
        VITE_API_URL: ${VITE_API_URL}
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
