x-api-env: &api-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CORS_ORIGINS: ${CORS_ORIGINS}
  REQUIRE_ADMIN_AUTH: ${REQUIRE_ADMIN_AUTH}
  ADMIN_USERNAME: ${ADMIN_USERNAME}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  AUTO_BOOTSTRAP_DEMO_DATA: ${AUTO_BOOTSTRAP_DEMO_DATA}
  REQUIRE_REDIS: ${REQUIRE_REDIS}
  APP_HASH_PEPPER: ${APP_HASH_PEPPER}
  EXPERIMENT_MASTER_SEED: ${EXPERIMENT_MASTER_SEED}
  DEPLOYMENT_CONTEXT: ${DEPLOYMENT_CONTEXT}
  SITE_CODE: ${SITE_CODE}
  CAMPAIGN_CODE: ${CAMPAIGN_CODE}
  ENVIRONMENT_LABEL: ${ENVIRONMENT_LABEL}
  DB_POOL_SIZE: ${DB_POOL_SIZE}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW}
  MIGRATION_LOCK_KEY: ${MIGRATION_LOCK_KEY:-2026050201}
  MIGRATION_LOCK_TIMEOUT_SECONDS: ${MIGRATION_LOCK_TIMEOUT_SECONDS:-300}
  MIGRATION_LOCK_RETRY_INTERVAL_SECONDS: ${MIGRATION_LOCK_RETRY_INTERVAL_SECONDS:-1}
  PROJECT_PARAMETERS_PATH: /app/project_parameters.json
  PORT: 8000

x-api-common: &api-common
  build:
    context: ./api-sonar-main/api-sonar-main
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    <<: *api-env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
    interval: 15s
    timeout: 5s
    retries: 10

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-a:
    <<: *api-common
    hostname: api-a
    container_name: sonar-api-a
    environment:
      <<: *api-env
      INSTANCE_NAME: api-a
    ports:
      - "8001:8000"

  api-b:
    <<: *api-common
    hostname: api-b
    container_name: sonar-api-b
    environment:
      <<: *api-env
      INSTANCE_NAME: api-b
    ports:
      - "8002:8000"

  api-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api-a:
        condition: service_healthy
      api-b:
        condition: service_healthy
    ports:
      - "8000:8080"
    volumes:
      - ./ops/nginx/api-ha.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
